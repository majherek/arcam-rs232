# Example configuration for the arcam-rs232 MQTT daemon.

mqtt:
  host: mosquitto
  port: 1883
  username: null
  username_env: null
  username_file: null
  password: null
  password_env: null
  password_file: null
  tls:
    enabled: false
    ca_file: null
    cert_file: null
    key_file: null
    insecure: false
  client_id: arcam-rs232
  daemon_topic: arcam/daemon
  retain: true
  qos: 0

devices:
  av888:
    model: av888
    topic: arcam/av888

    transport:
      type: tcp
      host: arcam-rs232.local
      port: 8899
      timeout_seconds: 1.0

    # Serial transport example:
    # transport:
    #   type: serial
    #   port: /dev/ttyUSB0
    #   baudrate: 38400
    #   timeout_seconds: 1.0

    polling:
      heartbeat_seconds: 5
      missed_heartbeats_limit: 2
      offline_retry_seconds: 10
      # Send arcam/daemon/cmd/scan=now to wake offline runners immediately.
      offline_backoff_max_seconds: 60
      core_refresh_seconds: 30
      burst_collection_seconds: 5

    commands:
      ack_timeout_seconds: 2
      reject_when_unavailable: true
      update_state_from_ack: false
      decode_2ch_mode_press_delay_ms: 300

    zones:
      zone1:
        enabled: true
        control_requires_power_on: true
        power_command_allowed_when_device_online: true
        core:
          - power
          - source
          - volume
          - mute
        extended:
          - room-eq
          - dolby-volume
          - direct
          - subwoofer-trim
          - sub-stereo-trim
          - decode-2ch
          - decode-mch
          - incoming-audio
          - sample-rate
          - audio-input
          - video-input

      zone2:
        enabled: true
        control_requires_power_on: true
        power_command_allowed_when_device_online: true
        core:
          - power
          - source
          - mute
        extended:
          - audio-input
          - sample-rate

      zone3:
        enabled: true
        control_requires_power_on: true
        power_command_allowed_when_device_online: true
        core:
          - power
          - volume
          - mute
        extended:
          - direct
          - video-input

  avr500:
    model: avr500
    topic: arcam/avr500

    transport:
      type: serial
      port: /dev/ttyUSB0
      baudrate: 38400
      timeout_seconds: 1.0

    polling:
      heartbeat_seconds: 5
      missed_heartbeats_limit: 2
      offline_retry_seconds: 10
      # Send arcam/daemon/cmd/scan=now to wake offline runners immediately.
      offline_backoff_max_seconds: 60
      core_refresh_seconds: 30
      burst_collection_seconds: 5

    commands:
      ack_timeout_seconds: 2
      reject_when_unavailable: true
      update_state_from_ack: false
      decode_2ch_mode_press_delay_ms: 300

    zones:
      zone1:
        enabled: true
        control_requires_power_on: true
        power_command_allowed_when_device_online: true
        core:
          - power
          - source
          - volume
        extended:
          - room-eq
          - dolby-volume

      zone2:
        enabled: true
        control_requires_power_on: true
        power_command_allowed_when_device_online: true
        core:
          - power
          - source
          - mute
        extended:
          - audio-input

      zone3:
        enabled: false
        control_requires_power_on: true
        power_command_allowed_when_device_online: true
        core:
          - power
        extended: []
